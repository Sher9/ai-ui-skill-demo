<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats Band · ui-style-craft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_tokens.css" />
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    .container { width: 100%; max-width: 1200px; margin-inline: auto; padding-inline: var(--space-6); }
    .section { padding-block: var(--space-20); }

    /* 数据带：着色背景，与相邻白底区块交替制造节奏 */
    .stats { background: color-mix(in srgb, var(--color-primary) 6%, var(--color-surface)); border: 1px solid color-mix(in srgb, var(--color-primary) 14%, transparent); border-radius: var(--radius-2xl); padding: var(--space-12); display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-8); }
    .stat { text-align: left; }
    .stat .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--font-size-5xl); font-weight: var(--font-weight-semibold); letter-spacing: var(--letter-spacing-tighter); line-height: var(--line-height-tight); }
    .stat .num .unit { font-size: var(--font-size-xl); color: var(--color-primary); margin-left: 2px; }
    .stat .label { color: var(--color-text-secondary); font-size: var(--font-size-sm); margin-top: var(--space-2); }
    .stat .delta { display: inline-flex; align-items: center; gap: 4px; margin-top: var(--space-2); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); color: var(--color-success); }
    .stat .delta.down { color: var(--color-danger); }

    @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); gap: var(--space-6); padding: var(--space-6); } }
  </style>
</head>
<body>
  <section class="container section">
    <div class="stats">
      <div class="stat">
        <div class="num">99.98<span class="unit">%</span></div>
        <div class="label">服务可用性（过去 12 个月）</div>
        <div class="delta"><i data-lucide="trending-up" style="width:14px;height:14px"></i> +0.12%</div>
      </div>
      <div class="stat">
        <div class="num">38<span class="unit">ms</span></div>
        <div class="label">查询延迟 P99</div>
        <div class="delta down"><i data-lucide="trending-down" style="width:14px;height:14px"></i> -11ms</div>
      </div>
      <div class="stat">
        <div class="num">4.2<span class="unit">k</span></div>
        <div class="label">日活工作区</div>
        <div class="delta"><i data-lucide="trending-up" style="width:14px;height:14px"></i> +8.4%</div>
      </div>
      <div class="stat">
        <div class="num">12<span class="unit">M</span></div>
        <div class="label">每月处理事件</div>
        <div class="delta"><i data-lucide="trending-up" style="width:14px;height:14px"></i> +22%</div>
      </div>
    </div>
  </section>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
